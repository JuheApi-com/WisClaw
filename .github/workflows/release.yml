# WisClaw Release Workflow
# Builds and publishes releases for macOS, Windows, and Linux

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true

permissions:
  contents: write
  actions: read

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Download uv binaries for macOS
        if: matrix.platform == 'mac'
        run: pnpm run uv:download:mac

      - name: Download uv binaries for Windows
        if: matrix.platform == 'win'
        run: pnpm run uv:download:win

      - name: Download uv binaries for Linux
        if: matrix.platform == 'linux'
        run: pnpm run uv:download:linux


      # macOS specific steps
      - name: Free disk space (macOS)
        if: matrix.platform == 'mac'
        run: |
          echo "=== Disk usage before cleanup ==="
          df -h /
          # Remove large pre-installed toolchains not needed for Electron builds
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/share/powershell || true
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf /usr/local/lib/node_modules || true
          rm -rf ~/Library/Caches/electron-builder/dmg-builder* || true
          # Homebrew cleanup
          brew cleanup --prune=all 2>/dev/null || true
          echo "=== Disk usage after cleanup ==="
          df -h /

      # --publish never: prevent electron-builder from auto-publishing to GitHub.
      # All artifacts are collected and published atomically in the publish job.
      - name: Build macOS
        if: matrix.platform == 'mac'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing is disabled — no certificates required
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          ulimit -n 65536
          echo "File descriptor limit: $(ulimit -n)"
          pnpm run package:mac

      # Windows specific steps
      - name: Build Windows
        if: matrix.platform == 'win'
        run: pnpm run package:win

      # Windows code signing is disabled — no SignPath/certificate required.
      # Windows SmartScreen will warn on first run; users can click "More info" → "Run anyway".

      # Linux specific steps
      - name: Build Linux
        if: matrix.platform == 'linux'
        run: pnpm run package:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.yml
            !release/builder-debug.yml
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Job: Publish to GitHub Releases
  # ──────────────────────────────────────────────────────────────
  publish:
    needs: release
    runs-on: ubuntu-latest
    
    steps:
      - name: Download release artifacts only
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-*

      - name: List all downloaded artifacts
        run: |
          echo "=== All artifacts downloaded ==="
          find release-artifacts/ -type f -exec ls -lh {} \;
          echo ""
          echo "=== File tree ==="
          tree release-artifacts/ || find release-artifacts/ -print

      - name: Remove duplicate builder-debug files
        run: |
          echo "Removing builder-debug.yml files to avoid duplicate asset upload conflicts..."
          find release-artifacts/ -name "builder-debug.yml" -delete -print || true

      - name: Create GitHub Release (as pre-release)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.zip
            release-artifacts/**/*.exe
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.yml
          draft: false
          prerelease: true
          make_latest: false
          generate_release_notes: true
          body: |
            ## 🚀 WisClaw ${{ github.ref_name }}
            
            WisClaw - Graphical AI Assistant based on OpenClaw
            
            ### 📦 Downloads
            
            Please select the appropriate installer for your operating system and architecture:
            
            #### macOS
            - **Apple Silicon (M1/M2/M3/M4)**: `WisClaw-*-mac-arm64.dmg`
            - **Intel (x64)**: `WisClaw-*-mac-x64.dmg`
            
            #### Windows
            - **Installer (x64)**: `WisClaw-*-win-x64.exe`
            - **Installer (ARM64)**: `WisClaw-*-win-arm64.exe`
            
            #### Linux
            - **AppImage (x64)**: `WisClaw-*-linux-x86_64.AppImage` (Universal format, recommended)
            - **AppImage (ARM64)**: `WisClaw-*-linux-arm64.AppImage`
            - **Debian/Ubuntu (x64)**: `WisClaw-*-linux-amd64.deb`
            - **Debian/Ubuntu (ARM64)**: `WisClaw-*-linux-arm64.deb`
            - **RPM (x64)**: `WisClaw-*-linux-x86_64.rpm`
            
            ### 📝 Release Notes
            
            See the auto-generated release notes below for detailed changes.
            
            ### ⚠️ Installation Notes
            
            - **macOS**: On first launch, you may see "cannot verify developer". Go to System Preferences → Security & Privacy to allow the app to run
            - **Windows**: SmartScreen may block the app. Click "More info" → "Run anyway" to proceed
            - **Linux AppImage**: First run `chmod +x WisClaw-*.AppImage` to add execute permission. On Ubuntu 22.04 you may also need `sudo apt install libfuse2`; on Ubuntu 24.04 use `sudo apt install libfuse2t64`
            - **Linux .deb (Ubuntu 24.04)**: If installation fails due to missing dependencies, use `sudo apt install libgtk-3-0t64 libnotify4t64 libxss1t64` before installing
            
            ---
            
            💬 Found an issue? Please submit an [Issue](https://github.com/${{ github.repository }}/issues)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Job: Upload to Cloudflare R2
  # Uploads all release artifacts to R2 (S3-compatible) for:
  #   - Official website downloads (via release-info.json)
  #   - electron-updater auto-update (via {channel}-*.yml)
  #
  # Required secrets:
  #   R2_ACCESS_KEY_ID      — R2 API token with Object Write permission
  #   R2_SECRET_ACCESS_KEY  — R2 API token secret
  #   R2_ENDPOINT           — e.g. https://<account-id>.r2.cloudflarestorage.com
  #   R2_BUCKET             — Bucket name, e.g. wisclaw-releases
  # ──────────────────────────────────────────────────────────────
  upload-r2:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts only
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-*

      - name: Extract version and channel
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi

          if [[ "$VERSION" =~ -([a-zA-Z]+) ]]; then
            CHANNEL="${BASH_REMATCH[1]}"
          else
            CHANNEL="latest"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}, channel: ${CHANNEL}"

      - name: Prepare upload directories
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          CHANNEL="${{ steps.version.outputs.channel }}"

          mkdir -p staging/${CHANNEL}
          mkdir -p staging/releases/${TAG}

          find release-artifacts/ -type f | while read file; do
            filename=$(basename "$file")
            cp "$file" "staging/${CHANNEL}/${filename}"
            cp "$file" "staging/releases/${TAG}/${filename}"
          done

          echo "=== staging/${CHANNEL}/ ==="
          ls -lh staging/${CHANNEL}/
          echo ""
          echo "=== staging/releases/${TAG}/ ==="
          ls -lh staging/releases/${TAG}/

      - name: Generate release-info.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANNEL="${{ steps.version.outputs.channel }}"
          BASE_URL="${{ secrets.R2_PUBLIC_BASE_URL }}/WisClaw/${CHANNEL}"

          jq -n \
            --arg version "$VERSION" \
            --arg channel "$CHANNEL" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg base "$BASE_URL" \
            --arg changelog "https://github.com/${{ github.repository }}/releases/tag/v${VERSION}" \
            '{
              version: $version,
              channel: $channel,
              releaseDate: $date,
              downloads: {
                mac: {
                  x64: ($base + "/WisClaw-" + $version + "-mac-x64.dmg"),
                  arm64: ($base + "/WisClaw-" + $version + "-mac-arm64.dmg")
                },
                win: {
                  x64: ($base + "/WisClaw-" + $version + "-win-x64.exe"),
                  arm64: ($base + "/WisClaw-" + $version + "-win-arm64.exe")
                },
                linux: {
                  deb_amd64: ($base + "/WisClaw-" + $version + "-linux-amd64.deb"),
                  deb_arm64: ($base + "/WisClaw-" + $version + "-linux-arm64.deb"),
                  appimage_x64: ($base + "/WisClaw-" + $version + "-linux-x86_64.AppImage"),
                  appimage_arm64: ($base + "/WisClaw-" + $version + "-linux-arm64.AppImage"),
                  rpm_x64: ($base + "/WisClaw-" + $version + "-linux-x86_64.rpm")
                }
              },
              changelog: $changelog
            }' > staging/${CHANNEL}/release-info.json

          echo "=== release-info.json ==="
          cat staging/${CHANNEL}/release-info.json

      - name: Install AWS CLI
        run: |
          pip install awscli --quiet

      - name: "Upload to R2: {channel}/ (overwrite)"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          CHANNEL="${{ steps.version.outputs.channel }}"

          echo "Uploading to R2: WisClaw/${CHANNEL}/..."
          aws s3 sync "staging/${CHANNEL}/" "s3://${R2_BUCKET}/WisClaw/${CHANNEL}/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --no-progress
          echo "Uploaded channel files to R2."

      - name: "Upload to R2: WisClaw/releases/vX.Y.Z/ (archive)"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          echo "Uploading to R2: WisClaw/releases/${TAG}/..."
          aws s3 sync "staging/releases/${TAG}/" "s3://${R2_BUCKET}/WisClaw/releases/${TAG}/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --no-progress
          echo "Uploaded archive files to R2."

      - name: Verify R2 upload
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          CHANNEL="${{ steps.version.outputs.channel }}"

          echo "=== Listing R2 wisclaw/${CHANNEL}/ ==="
          aws s3 ls "s3://${R2_BUCKET}/WisClaw/${CHANNEL}/" \
            --endpoint-url "${R2_ENDPOINT}"
          echo ""
          echo "R2 upload verified successfully!"

  # ──────────────────────────────────────────────────────────────
  # Job: Finalize Release
  # Promotes the GitHub Release from pre-release to latest AFTER
  # both GitHub Release assets and OSS uploads are fully complete.
  # This ensures /releases/latest API never returns an incomplete
  # release — the website and electron-updater only see it when
  # all platform artifacts are ready.
  # ──────────────────────────────────────────────────────────────
  finalize:
    needs: [publish, upload-r2]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Promote release from pre-release to latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          IS_PRERELEASE_CHANNEL=false

          if [[ "$TAG" == *"alpha"* ]] || [[ "$TAG" == *"beta"* ]]; then
            IS_PRERELEASE_CHANNEL=true
          fi

          if [ "$IS_PRERELEASE_CHANNEL" = "true" ]; then
            echo "Tag $TAG is an alpha/beta release — keeping as pre-release."
          else
            echo "Promoting $TAG from pre-release to latest release..."
            gh release edit "$TAG" \
              --prerelease=false \
              --latest \
              --repo "${{ github.repository }}"
            echo "Release $TAG is now the latest release."
          fi
